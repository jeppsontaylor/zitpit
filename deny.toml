[graph]
all-features = true

[advisories]
version = 2
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "deny"
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "transitive through ratatui/crossterm; tracked until the upstream stack replaces paste" },
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
