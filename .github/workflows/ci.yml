name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      firecracker_smoke:
        description: Run optional Firecracker smoke checks
        required: false
        default: "false"

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Format
        run: cargo fmt --check
      - name: Dependency and license policy
        run: cargo deny check all
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Unit and integration tests
        run: cargo test -q

  repo-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Claim matrix
        run: python3 scripts/check_claim_matrix.py
      - name: Publication sync
        run: python3 scripts/check_publication_sync.py
      - name: Markdown links
        run: python3 scripts/check_markdown_links.py
      - name: Repo hygiene
        run: ./scripts/check_repo_hygiene.sh

  paper-build:
    runs-on: ubuntu-latest
    needs: repo-contracts
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: xu-cheng/latex-action@e2f99d4b3685b0da93f97e1b86ad8fab81105098
        with:
          working_directory: paper
          root_file: main.tex
          args: -pdf -bibtex -interaction=nonstopmode -halt-on-error

  docker-demo:
    runs-on: ubuntu-latest
    needs:
      - rust-fast
      - repo-contracts
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Build cached service image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile.service
          load: true
          tags: zitpit-service:dev
          cache-from: type=gha,scope=zitpit-service
          cache-to: type=gha,mode=max,scope=zitpit-service
      - name: Build cached workspace image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile.workspace
          load: true
          tags: zitpit-workspace-ssh:latest
          cache-from: type=gha,scope=zitpit-workspace
          cache-to: type=gha,mode=max,scope=zitpit-workspace
      - name: Demo up
        env:
          ZITPIT_DEMO_NO_BUILD: "1"
        run: cargo run -q -p xtask -- demo up
      - name: Demo status
        run: cargo run -q -p xtask -- demo status
      - name: Demo smoke
        run: cargo run -q -p xtask -- demo smoke
      - name: Upload demo reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: zitpit-demo-reports
          if-no-files-found: ignore
          path: |
            .zitpit/demo/last_up.json
            .zitpit/demo/last_smoke.json
            .zitpit/demo/last_build_timings.json
      - name: Demo down
        if: always()
        run: cargo run -q -p xtask -- demo down

  tui-snapshots:
    runs-on: ubuntu-latest
    needs: rust-fast
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Ratatui render tests
        run: cargo test -q -p zitpit-tui

  firecracker-exploratory:
    runs-on: ubuntu-latest
    needs: rust-fast
    if: github.event_name == 'workflow_dispatch' && inputs.firecracker_smoke == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Firecracker capability check
        run: |
          test -e /dev/kvm || {
            echo "/dev/kvm is not available on this runner";
            exit 1;
          }
      - name: Exploratory KVM smoke
        run: cargo test -q -p zitpit-core firecracker -- --nocapture
