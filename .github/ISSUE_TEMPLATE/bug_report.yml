name: Bug Report
description: File a bug report for ZitPit core, gateway, or lab environments.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting an issue to ZitPit. 
        If this is a security bypass or vulnerability, please refer to SECURITY.md for responsible disclosure rather than filing it here.
  - type: input
    id: version
    attributes:
      label: ZitPit Version
      description: The version of ZitPit or component (e.g. gateway, core)
      placeholder: v0.1.0 or latest commit SHA
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this? E.g., commands run in xtask or shell constraints.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
