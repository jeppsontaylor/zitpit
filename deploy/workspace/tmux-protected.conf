set -g default-shell /bin/zsh
set -g default-command "/bin/zsh -il"
set -g status on
set -g status-position top
set -g status-interval 2
set -g status-justify left
set -g status-style "fg=colour231,bg=colour28,bold"
set -g message-style "fg=colour231,bg=colour34,bold"
set -g mode-style "fg=colour231,bg=colour40,bold"
set -g pane-border-style "fg=colour34"
set -g pane-active-border-style "fg=colour51"
set -g status-left-length 48
set -g status-right-length 64
set -g status-left "#[fg=colour231,bg=colour28,bold] LOCK #[fg=colour226,bg=colour22,bold] DREAM #[fg=colour51,bg=colour24,bold] SHELL "
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour16,bg=colour51,bold] #I:#W "
set -g status-right "#[fg=colour231,bg=colour28,bold] ZITPIT #[fg=colour226,bg=colour22,bold]LOCK#[fg=colour51,bg=colour24,bold] %H:%M "
set -g detach-on-destroy off
set -g destroy-unattached on
