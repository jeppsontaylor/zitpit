set -g default-shell /bin/bash
set -g default-command "/bin/bash -il"
set -g status on
set -g status-position top
set -g status-interval 2
set -g status-justify left
set -g status-style "fg=colour231,bg=colour28,bold"
set -g message-style "fg=colour231,bg=colour28"
set -g mode-style "fg=colour231,bg=colour22,bold"
set -g pane-border-style "fg=colour28"
set -g pane-active-border-style "fg=colour40"
set -g status-left-length 32
set -g status-right-length 64
set -g status-left "#[fg=colour231,bold] ZITPIT #[fg=colour195]SAFE SHELL "
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour231,bg=colour34,bold] #I:#W "
set -g status-right "#[fg=colour231,bold]ZITPIT PROTECTED#[nobold] %H:%M "
set -g detach-on-destroy off
set -g destroy-unattached on
