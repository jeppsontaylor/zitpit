<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">ZitPit current five-repo speedup snapshot</title>
  <desc id="desc">Grouped bar chart comparing web, approved cache, and hot-cache latency for five public Git repositories using one sample per repo.</desc>

  <defs>
    <style>
      .bg { fill: #fbfaf7; }
      .title { font: 700 30px/1.2 "Inter", "Helvetica Neue", Arial, sans-serif; fill: #132238; }
      .subtitle { font: 400 16px/1.4 "Inter", "Helvetica Neue", Arial, sans-serif; fill: #516170; }
      .axis { stroke: #5f6b7a; stroke-width: 2; }
      .grid { stroke: #d8dde3; stroke-width: 1; }
      .tick { font: 12px "Inter", "Helvetica Neue", Arial, sans-serif; fill: #516170; }
      .label { font: 600 15px "Inter", "Helvetica Neue", Arial, sans-serif; fill: #132238; }
      .value { font: 600 13px "Inter", "Helvetica Neue", Arial, sans-serif; fill: #132238; }
      .footer { font: 400 13px "Inter", "Helvetica Neue", Arial, sans-serif; fill: #667585; }
      .legend { font: 600 14px "Inter", "Helvetica Neue", Arial, sans-serif; fill: #223243; }
    </style>

    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5f6b7a" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760" />

  <text class="title" x="70" y="48">ZitPit speedup snapshot</text>
  <text class="subtitle" x="70" y="74">Five public Git repositories, one sample per mode, measured as direct upstream web vs approved disk cache vs in-memory hot cache</text>

  <g transform="translate(820 34)">
    <rect x="0" y="0" width="18" height="18" rx="4" fill="#b23a48" />
    <text class="legend" x="26" y="14">web</text>
    <rect x="88" y="0" width="18" height="18" rx="4" fill="#2b6cb0" />
    <text class="legend" x="114" y="14">cache</text>
    <rect x="184" y="0" width="18" height="18" rx="4" fill="#1f9d68" />
    <text class="legend" x="210" y="14">hot-cache</text>
  </g>

  <!-- Plot frame -->
  <line class="axis" x1="100" y1="180" x2="100" y2="560" />
  <line class="axis" x1="100" y1="560" x2="1110" y2="560" />

  <!-- grid lines and ticks -->
  <g>
    <line class="grid" x1="100" y1="560" x2="1110" y2="560" />
    <line class="grid" x1="100" y1="475.6" x2="1110" y2="475.6" />
    <line class="grid" x1="100" y1="391.1" x2="1110" y2="391.1" />
    <line class="grid" x1="100" y1="306.7" x2="1110" y2="306.7" />
    <line class="grid" x1="100" y1="222.2" x2="1110" y2="222.2" />
    <line class="grid" x1="100" y1="180" x2="1110" y2="180" />

    <text class="tick" x="68" y="564">0</text>
    <text class="tick" x="56" y="479.6">200</text>
    <text class="tick" x="56" y="395.1">400</text>
    <text class="tick" x="56" y="310.7">600</text>
    <text class="tick" x="56" y="226.2">800</text>
    <text class="tick" x="56" y="184">900</text>
    <text class="tick" x="24" y="205" transform="rotate(-90 24 205)">Latency (ms)</text>
  </g>

  <!-- Bars: scale = 380 / 900 = 0.4222 -->
  <!-- git -->
  <g>
    <rect x="148" y="385.8" width="26" height="174.2" rx="5" fill="#b23a48" />
    <rect x="182" y="545.6" width="26" height="14.4" rx="5" fill="#2b6cb0" />
    <rect x="216" y="553.7" width="26" height="6.3" rx="5" fill="#1f9d68" />
    <text class="value" x="161" y="378" text-anchor="middle">413</text>
    <text class="value" x="195" y="538" text-anchor="middle">34</text>
    <text class="value" x="229" y="547" text-anchor="middle">15</text>
    <text class="label" x="191" y="600" text-anchor="middle">git</text>
  </g>

  <!-- go -->
  <g>
    <rect x="348" y="357.7" width="26" height="202.3" rx="5" fill="#b23a48" />
    <rect x="382" y="547.3" width="26" height="12.7" rx="5" fill="#2b6cb0" />
    <rect x="416" y="553.2" width="26" height="6.8" rx="5" fill="#1f9d68" />
    <text class="value" x="361" y="350" text-anchor="middle">479</text>
    <text class="value" x="395" y="540" text-anchor="middle">30</text>
    <text class="value" x="429" y="547" text-anchor="middle">16</text>
    <text class="label" x="391" y="600" text-anchor="middle">go</text>
  </g>

  <!-- node -->
  <g>
    <rect x="548" y="265.8" width="26" height="294.2" rx="5" fill="#b23a48" />
    <rect x="582" y="546.9" width="26" height="13.1" rx="5" fill="#2b6cb0" />
    <rect x="616" y="554.1" width="26" height="5.9" rx="5" fill="#1f9d68" />
    <text class="value" x="561" y="258" text-anchor="middle">697</text>
    <text class="value" x="595" y="539" text-anchor="middle">31</text>
    <text class="value" x="629" y="547" text-anchor="middle">14</text>
    <text class="label" x="591" y="600" text-anchor="middle">node</text>
  </g>

  <!-- cpython -->
  <g>
    <rect x="748" y="213.1" width="26" height="346.9" rx="5" fill="#b23a48" />
    <rect x="782" y="546.9" width="26" height="13.1" rx="5" fill="#2b6cb0" />
    <rect x="816" y="553.7" width="26" height="6.3" rx="5" fill="#1f9d68" />
    <text class="value" x="761" y="205" text-anchor="middle">821</text>
    <text class="value" x="795" y="539" text-anchor="middle">31</text>
    <text class="value" x="829" y="547" text-anchor="middle">15</text>
    <text class="label" x="791" y="600" text-anchor="middle">cpython</text>
  </g>

  <!-- terraform -->
  <g>
    <rect x="948" y="241.2" width="26" height="318.8" rx="5" fill="#b23a48" />
    <rect x="982" y="546.1" width="26" height="13.9" rx="5" fill="#2b6cb0" />
    <rect x="1016" y="553.2" width="26" height="6.8" rx="5" fill="#1f9d68" />
    <text class="value" x="961" y="233" text-anchor="middle">755</text>
    <text class="value" x="995" y="538" text-anchor="middle">33</text>
    <text class="value" x="1029" y="547" text-anchor="middle">16</text>
    <text class="label" x="991" y="600" text-anchor="middle">terraform</text>
  </g>

  <text class="footer" x="70" y="670">Current public demonstration run: 5 repos, N=1 sample per repo. Source: docs/benchmarks/latest.json.</text>
  <text class="footer" x="70" y="694">web = direct upstream git ls-remote; cache = approved disk cache; hot-cache = in-memory hot cache.</text>
</svg>
