<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">ZitPit speed-up snapshot</title>
  <desc id="desc">Horizontal bar chart showing cache and hot-cache speed-up ratios versus direct web fetch for five public Git repositories.</desc>

  <defs>
    <linearGradient id="cacheFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9b54" />
      <stop offset="100%" stop-color="#ffd166" />
    </linearGradient>
    <linearGradient id="hotFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#44d7b6" />
      <stop offset="100%" stop-color="#7af0ff" />
    </linearGradient>
    <style>
      .card { fill: #0f1620; stroke: #243243; stroke-width: 1.5; }
      .title { font: 700 30px/1.2 "Helvetica Neue", Arial, sans-serif; fill: #f3f7fb; }
      .subtitle { font: 400 16px/1.4 "Helvetica Neue", Arial, sans-serif; fill: #9fb0c3; }
      .label { font: 700 17px/1.2 "Helvetica Neue", Arial, sans-serif; fill: #e8eef5; }
      .metric { font: 600 13px/1.2 "Helvetica Neue", Arial, sans-serif; fill: #0f1620; }
      .ratio { font: 700 14px/1.2 "Helvetica Neue", Arial, sans-serif; fill: #dfe8f2; }
      .legend { font: 600 14px/1.2 "Helvetica Neue", Arial, sans-serif; fill: #d7e1ec; }
      .footer { font: 400 13px/1.4 "Helvetica Neue", Arial, sans-serif; fill: #8ea0b3; }
      .track { fill: #1a2431; }
    </style>
  </defs>

  <rect x="20" y="20" width="1160" height="520" rx="28" class="card" />

  <text x="64" y="72" class="title">ZitPit speed-up snapshot</text>
  <text x="64" y="102" class="subtitle">Speed-up ratios derived from the current benchmark snapshot: approved cache and hot-cache versus direct upstream web fetch.</text>

  <g transform="translate(874 58)">
    <rect x="0" y="0" width="18" height="18" rx="5" fill="url(#cacheFill)" />
    <text x="28" y="14" class="legend">cache vs web</text>
    <rect x="144" y="0" width="18" height="18" rx="5" fill="url(#hotFill)" />
    <text x="172" y="14" class="legend">hot-cache vs web</text>
  </g>

  <g transform="translate(64 150)">
    <text x="0" y="30" class="label">git</text>
    <rect x="132" y="10" width="420" height="22" rx="11" class="track" />
    <rect x="132" y="10" width="92" height="22" rx="11" fill="url(#cacheFill)" />
    <text x="178" y="26" text-anchor="middle" class="metric">12.1x</text>
    <text x="572" y="27" class="ratio">12.1x</text>
    <rect x="132" y="42" width="420" height="22" rx="11" class="track" />
    <rect x="132" y="42" width="210" height="22" rx="11" fill="url(#hotFill)" />
    <text x="237" y="58" text-anchor="middle" class="metric">27.5x</text>
    <text x="572" y="59" class="ratio">27.5x</text>

    <text x="0" y="116" class="label">go</text>
    <rect x="132" y="96" width="420" height="22" rx="11" class="track" />
    <rect x="132" y="96" width="122" height="22" rx="11" fill="url(#cacheFill)" />
    <text x="193" y="112" text-anchor="middle" class="metric">16.0x</text>
    <text x="572" y="113" class="ratio">16.0x</text>
    <rect x="132" y="128" width="420" height="22" rx="11" class="track" />
    <rect x="132" y="128" width="228" height="22" rx="11" fill="url(#hotFill)" />
    <text x="246" y="144" text-anchor="middle" class="metric">29.9x</text>
    <text x="572" y="145" class="ratio">29.9x</text>

    <text x="0" y="202" class="label">node</text>
    <rect x="132" y="182" width="420" height="22" rx="11" class="track" />
    <rect x="132" y="182" width="172" height="22" rx="11" fill="url(#cacheFill)" />
    <text x="218" y="198" text-anchor="middle" class="metric">22.5x</text>
    <text x="572" y="199" class="ratio">22.5x</text>
    <rect x="132" y="214" width="420" height="22" rx="11" class="track" />
    <rect x="132" y="214" width="381" height="22" rx="11" fill="url(#hotFill)" />
    <text x="322" y="230" text-anchor="middle" class="metric">49.8x</text>
    <text x="572" y="231" class="ratio">49.8x</text>

    <text x="0" y="288" class="label">cpython</text>
    <rect x="132" y="268" width="420" height="22" rx="11" class="track" />
    <rect x="132" y="268" width="202" height="22" rx="11" fill="url(#cacheFill)" />
    <text x="233" y="284" text-anchor="middle" class="metric">26.5x</text>
    <text x="572" y="285" class="ratio">26.5x</text>
    <rect x="132" y="300" width="420" height="22" rx="11" class="track" />
    <rect x="132" y="300" width="418" height="22" rx="11" fill="url(#hotFill)" />
    <text x="341" y="316" text-anchor="middle" class="metric">54.7x</text>
    <text x="572" y="317" class="ratio">54.7x</text>

    <text x="0" y="374" class="label">terraform</text>
    <rect x="132" y="354" width="420" height="22" rx="11" class="track" />
    <rect x="132" y="354" width="175" height="22" rx="11" fill="url(#cacheFill)" />
    <text x="220" y="370" text-anchor="middle" class="metric">22.9x</text>
    <text x="572" y="371" class="ratio">22.9x</text>
    <rect x="132" y="386" width="420" height="22" rx="11" class="track" />
    <rect x="132" y="386" width="360" height="22" rx="11" fill="url(#hotFill)" />
    <text x="312" y="402" text-anchor="middle" class="metric">47.2x</text>
    <text x="572" y="403" class="ratio">47.2x</text>
  </g>

  <text x="64" y="500" class="footer">Source: docs/benchmarks/latest.json. Current public run: N=1 sample per repo.</text>
  <text x="64" y="522" class="footer">Ratios compare local approved-path performance against direct upstream web fetch.</text>
</svg>
